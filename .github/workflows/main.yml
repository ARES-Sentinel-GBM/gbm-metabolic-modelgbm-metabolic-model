name: ARES Scientific Audit CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Python 3.10
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas numpy matplotlib cobra optlang lxml

    - name: Run Metabolic Pipeline
      env:
        PYTHONPATH: ${{ github.workspace }}
      run: |
        python pipeline.py

    - name: Check Audit Results
      run: |
        if grep -q "FAIL" SECURITY_AUDIT.md; then
          echo "Audit failed!"
          exit 1
        else
          echo "Audit passed successfully."
        fi